<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回忆录统计中心</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f1eb; color: #5c5c5c; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #ffffff; border-radius: 16px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); width: 100%; max-width: 500px; }
        h2 { color: #788583; font-weight: 500; text-align: center; margin-bottom: 30px; }
        .preview { display: flex; justify-content: space-around; background: #f9f7f2; border-radius: 12px; padding: 20px; margin-bottom: 30px; border: 1px solid #ece9e0; }
        .stat-item { text-align: center; }
        .label { font-size: 12px; color: #a5acaa; margin-bottom: 5px; }
        .value { font-size: 20px; color: #788583; font-weight: 600; }
        .code-box { background: #fafafa; border: 1px dashed #d0b8b4; border-radius: 8px; padding: 15px; position: relative; }
        code { font-family: monospace; font-size: 13px; color: #8da493; word-break: break-all; }
        .copy-btn { margin-top: 15px; width: 100%; padding: 12px; background: #a0b5a6; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .copy-btn:hover { background: #8da493; }
    </style>
</head>
<body>
    <div class="container">
        <h2>统计插件配置</h2>
        <div class="preview">
            <div class="stat-item"><div class="label">流年足迹</div><div class="value" id="total">...</div></div>
            <div class="stat-item"><div class="label">今日偶遇</div><div class="value" id="today">...</div></div>
        </div>
        <div class="code-box">
            <code id="code-snippet">正在生成...</code>
        </div>
        <button class="copy-btn" onclick="copyCode()">复制引用链接</button>
    </div>
    <script>
        const apiUrl = window.location.origin;
        const snippet = `<div id="stat-card"></div>\n<script src="${apiUrl}/stats?js"><\/script>`;
        document.getElementById('code-snippet').innerText = snippet;

        fetch('/stats').then(r => r.json()).then(data => {
            document.getElementById('total').innerText = data.total;
            document.getElementById('today').innerText = data.today;
        });

        function copyCode() {
            navigator.clipboard.writeText(snippet);
            alert('代码已复制');
        }
    </script>
</body>
</html>
